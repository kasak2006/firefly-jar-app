<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>the firefly jar</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('firefly-jar-theme')
          // light is the default theme; only 'dark' and explicit 'system' opt out of it
          if (t === 'system') {
            // leave data-theme unset so the OS preference media query applies
          } else if (t === 'dark') {
            document.documentElement.dataset.theme = 'dark'
          } else {
            document.documentElement.dataset.theme = 'light'
          }
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
